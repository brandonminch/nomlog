name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version from root package.json `packageManager`; omit `with.version` to avoid mismatch errors

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install

      # Lint is not enforced repo-wide yet (pre-existing failures in nomlog-app, nomlog-api).
      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
